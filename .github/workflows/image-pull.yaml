---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: kubernetes/**/*

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Flate Diff
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.flate.outputs.images }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          install_args: github:home-operations/flate

      - name: Run Flate
        id: flate
        run: |
          {
            echo 'images<<EOF'
            mise exec -- flate diff images -p ./kubernetes/flux/cluster -o json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  pull:
    if: >-
      ${{
        github.event.pull_request.head.repo.full_name == github.repository &&
        needs.diff.outputs.images != '' &&
        needs.diff.outputs.images != '[]'
      }}
    needs: diff
    name: Image Pull - Pull Images
    runs-on: home-ops-runner
    strategy:
      matrix:
        image: ${{ fromJSON(needs.diff.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          install: false

      - name: Pull image
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          TALOSCTL_VERSION="$(awk -F'"' '$1 == "talosctl = " { print $2 }' .mise/config.toml)"
          if [ -z "${TALOSCTL_VERSION}" ]; then
            echo "::error::Could not read talosctl version from .mise/config.toml"
            exit 1
          fi

          mise exec -C /tmp "talosctl@${TALOSCTL_VERSION}" -- talosctl --nodes "${NODE}" image pull "${IMAGE}"

  success:
    if: ${{ !cancelled() }}
    needs:
      - filter
      - diff
      - pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
