---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Codex Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
      publish_comment:
        description: Publish or update a pull request summary comment
        type: boolean
        default: true
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  review:
    name: Codex Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      CODEX_MODEL: ${{ vars.CODEX_MODEL || 'gpt-5.5' }}
      CODEX_VERSION: 0.137.0
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ inputs.pr_number }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Load pull request metadata
        id: pr
        run: |-
          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"

          base_ref="$(echo "${pr_json}" | jq -r '.base.ref')"
          base_sha="$(echo "${pr_json}" | jq -r '.base.sha')"
          head_repo="$(echo "${pr_json}" | jq -r '.head.repo.full_name')"
          head_sha="$(echo "${pr_json}" | jq -r '.head.sha')"

          if [ "${head_repo}" != "${REPOSITORY}" ]; then
            echo "Codex Review is limited to same-repository pull requests for now." >> "${GITHUB_STEP_SUMMARY}"
            echo "Refusing to run on ${head_repo}." >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          {
            echo "base_ref=${base_ref}"
            echo "base_sha=${base_sha}"
            echo "head_sha=${head_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout pull request merge commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/pull/${{ inputs.pr_number }}/merge

      - name: Fetch review refs
        env:
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |-
          git fetch --no-tags origin "${BASE_REF}" "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}/head"

      - name: Generate review schema
        run: |-
          cat > codex-output-schema.json <<'JSON'
          {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "additionalProperties": false,
            "required": [
              "overall_correctness",
              "overall_explanation",
              "overall_confidence_score",
              "findings"
            ],
            "properties": {
              "overall_correctness": {
                "type": "string",
                "enum": ["patch is correct", "patch is incorrect"]
              },
              "overall_explanation": {
                "type": "string",
                "minLength": 1
              },
              "overall_confidence_score": {
                "type": "number",
                "minimum": 0,
                "maximum": 1
              },
              "findings": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "required": [
                    "title",
                    "body",
                    "confidence_score",
                    "priority",
                    "code_location"
                  ],
                  "properties": {
                    "title": {
                      "type": "string",
                      "maxLength": 80
                    },
                    "body": {
                      "type": "string",
                      "minLength": 1
                    },
                    "confidence_score": {
                      "type": "number",
                      "minimum": 0,
                      "maximum": 1
                    },
                    "priority": {
                      "type": "integer",
                      "minimum": 0,
                      "maximum": 3
                    },
                    "code_location": {
                      "type": "object",
                      "additionalProperties": false,
                      "required": ["relative_file_path", "line_range"],
                      "properties": {
                        "relative_file_path": {
                          "type": "string",
                          "minLength": 1
                        },
                        "line_range": {
                          "type": "object",
                          "additionalProperties": false,
                          "required": ["start", "end"],
                          "properties": {
                            "start": {
                              "type": "integer",
                              "minimum": 1
                            },
                            "end": {
                              "type": "integer",
                              "minimum": 1
                            }
                          }
                        }
                      }
                    }
                  }
                },
                "default": []
              }
            }
          }
          JSON

      - name: Generate review prompt
        env:
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |-
          cat > codex-prompt.md <<'PROMPT'
          You are acting as a reviewer for a proposed change to a Home Operations GitOps repository.

          Focus on actionable issues introduced by the pull request. Prioritize correctness, security,
          reliability, maintainability, and operator experience. Avoid nitpicks unless they materially
          affect understanding or safety.

          Repository-specific review notes:
          - Git is the source of truth; do not recommend imperative cluster fixes except diagnostics.
          - Treat SOPS-encrypted files, ExternalSecret names and keys, PVCs, storage classes, VolSync
            objects, backup schedules, and restore wiring as high-risk surfaces.
          - CI should call purpose-built tools directly; justfiles are local/operator UX.
          - Prefer this repository's existing Kubernetes app layout and Home Operations patterns.

          Return only findings caused by this pull request. If there are no actionable findings, return
          an empty findings array and mark the patch correct.
          PROMPT

          {
            echo ""
            echo "Repository: ${REPOSITORY}"
            echo "Pull Request #: ${PR_NUMBER}"
            echo "Base SHA: ${BASE_SHA}"
            echo "Head SHA: ${HEAD_SHA}"
            echo ""
            echo "Changed files:"
            git --no-pager diff --name-status "${BASE_SHA}" "${HEAD_SHA}"
            echo ""
            echo "Unified diff:"
            git --no-pager diff --unified=5 --stat=200 "${BASE_SHA}" "${HEAD_SHA}"
            git --no-pager diff --unified=5 "${BASE_SHA}" "${HEAD_SHA}"
          } >> codex-prompt.md

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@9cdb6f3861cdefafeeaec70dfb42687be5ca62d3 # main, 2026-05-26
        with:
          codex-version: ${{ env.CODEX_VERSION }}
          model: ${{ env.CODEX_MODEL }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          output-file: codex-output.json
          output-schema-file: codex-output-schema.json
          prompt-file: codex-prompt.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Render review summary
        run: |-
          if [ ! -s codex-output.json ]; then
            echo "Codex did not produce codex-output.json" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          jq '.' codex-output.json

          jq -r --arg model "${CODEX_MODEL}" '
            def loc:
              .code_location.relative_file_path + ":" +
              (.code_location.line_range.start | tostring) +
              (if .code_location.line_range.end != .code_location.line_range.start then
                "-" + (.code_location.line_range.end | tostring)
              else
                ""
              end);

            "<!-- codex-review -->\n" +
            "### Codex automated review\n\n" +
            "**Verdict:** `" + .overall_correctness + "`  \n" +
            "**Confidence:** `" + (.overall_confidence_score | tostring) + "`  \n" +
            "**Model:** `" + $model + "`\n\n" +
            .overall_explanation + "\n\n" +
            (if (.findings | length) == 0 then
              "No actionable findings."
            else
              "#### Findings\n\n" +
              ([.findings[] |
                "- **P" + (.priority | tostring) + " " + .title + "** (`" + loc + "`)\n\n" +
                "  " + (.body | gsub("\n"; "\n  ")) + "\n\n" +
                "  Confidence: `" + (.confidence_score | tostring) + "`"
              ] | join("\n\n"))
            end) +
            "\n\n<sub>Generated by the manual Codex Review workflow.</sub>\n"
          ' codex-output.json > codex-review.md

          cat codex-review.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Publish review summary comment
        if: ${{ inputs.publish_comment }}
        run: |-
          jq -n --rawfile body codex-review.md '{body: $body}' > comment.json

          comment_id="$(
            gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
              --jq '.[] | select(.body | contains("<!-- codex-review -->")) | .id' \
              | head -n 1
          )"

          if [ -n "${comment_id}" ]; then
            gh api \
              --method PATCH \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              --input comment.json
          else
            gh api \
              --method POST \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input comment.json
          fi
