---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate Review Trigger

on:
  # zizmor: ignore[dangerous-triggers]
  # This workflow does not checkout or execute PR content. It only dispatches
  # the default-branch reviewer workflow for same-repo Renovate PRs.
  pull_request_target:
    types:
      - labeled
    branches:
      - main

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  dispatch-review:
    # Eligibility is enforced declaratively here; base=main comes from
    # on.branches. State (open) is left to the reviewer's own check.
    if: >-
      github.event.label.name == 'renovate-review' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'bot-ler[bot]' &&
      !github.event.pull_request.draft
    name: Renovate Review Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch Renovate review
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh workflow run renovate-review.yaml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f "pr=${PR}"

      - name: Remove trigger label
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if ! gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/issues/${PR}/labels/renovate-review"; then
            echo "::notice::Could not remove renovate-review label automatically"
          fi
