---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate Research Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
    paths:
      - kubernetes/**
      - bootstrap/**
      - talos/**

env:
  FORCE_REVIEW: ${{ github.event.action == 'labeled' && github.event.label.name == 'renovate-review' }}
  PR_NUMBER: ${{ github.event.pull_request.number }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  statuses: read

jobs:
  renovate-review:
    if: >-
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.login == 'bot-ler[bot]' &&
        !github.event.pull_request.draft &&
        (
          github.event.action != 'labeled' ||
          github.event.label.name == 'renovate-review'
        )
      )
    name: Renovate Research Review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check reviewer config
        id: config
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not configured; skipping Renovate research review"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Check review scope
        id: scope
        if: ${{ steps.config.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ env.PR_NUMBER }}
        run: |
          # Claude app-token validation requires the reviewer workflow to match
          # the default branch, so skip self-edits.
          if gh pr view "${PR}" --repo "${GITHUB_REPOSITORY}" --json files \
              --jq '.files[].path' | grep -Fxq ".github/workflows/renovate-review.yaml"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping; reviewer workflow self-edit must match the default branch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/pull/${{ env.PR_NUMBER }}/merge

      - name: Prepare review
        id: review
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' }}
        env:
          FORCE_REVIEW: ${{ env.FORCE_REVIEW }}
          GH_TOKEN: ${{ github.token }}
          PR: ${{ env.PR_NUMBER }}
        run: |
          policy_version="5"
          review_input="${RUNNER_TEMP}/renovate-review-input.txt"
          review_files="${RUNNER_TEMP}/renovate-review-files.json"
          prior_review_meta="${RUNNER_TEMP}/renovate-review-prior-reviews.json"
          previous_review_body="${RUNNER_TEMP}/renovate-review-previous-body.txt"

          gh pr view "${PR}" \
            --json title,body,files,headRefOid \
            --jq '
              {
                title,
                headRefOid,
                files: [.files[].path],
                renovateTable: ((.body // "") | split("---")[0])
              }
            ' > "${review_files}"

          head_sha="$(jq -r '.headRefOid' "${review_files}")"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

          # Normalize the whole PR patch so same-content rebases skip while
          # companion commits still change the review key.
          pr_patch_ids="$(
            gh pr diff "${PR}" --repo "${GITHUB_REPOSITORY}" --patch |
              git patch-id --stable |
              awk '{print $1}' |
              sort
          )"

          if [ -z "${pr_patch_ids}" ]; then
            echo "::notice::PR diff produced no stable patch ids; using an empty patch marker"
            pr_patch_ids="empty"
          fi

          pr_patch_id="$(printf "%s\n" "${pr_patch_ids}" | sha256sum | cut -d " " -f 1)"

          jq --arg policy_version "${policy_version}" \
            --arg pr_patch_id "${pr_patch_id}" \
            '{
              title,
              files: (.files | sort),
              renovateTable,
              policyVersion: $policy_version,
              stablePrPatchId: $pr_patch_id
            }' \
            "${review_files}" > "${review_input}"

          fingerprint="$(sha256sum "${review_input}" | cut -d " " -f 1)"
          echo "fingerprint=${fingerprint}" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "::notice::Prepared Renovate review key policy=${policy_version} head=${head_sha} pr_patch=${pr_patch_id} fingerprint=${fingerprint}"

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/reviews" --paginate > "${prior_review_meta}"

          latest_review="$(
            jq -c '
              [
                .[]
                | select(.user.login == "claude[bot]")
                | select(.body != null and (.body | contains("home-ops-renovate-research")))
              ]
              | sort_by(.submitted_at)
              | last // {}
            ' "${prior_review_meta}"
          )"

          previous_review_commit="$(jq -r '.commit_id // ""' <<< "${latest_review}")"
          jq -r '.body // ""' <<< "${latest_review}" > "${previous_review_body}"

          if [ "${FORCE_REVIEW}" != "true" ] && [ "${previous_review_commit}" = "${head_sha}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Renovate research review; current head ${head_sha} already has a Claude review marker"
            exit 0
          fi

          previous_fingerprint="$(
            grep -Eo 'home-ops-renovate-research fingerprint:[0-9a-f]+' "${previous_review_body}" |
              tail -n 1 |
              sed 's/.*fingerprint://'
          )" || true

          if [ "${FORCE_REVIEW}" != "true" ] && [ -n "${previous_fingerprint}" ] && [ "${previous_fingerprint}" = "${fingerprint}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Renovate research review; review key ${fingerprint} was already reviewed"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Review Renovate PR
        id: claude
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' && steps.review.outputs.skip != 'true' }}
        uses: anthropics/claude-code-action@4d7e1f0cd85743fdc93b1c8040ab54395da024e2 # v1.0.149
        env:
          GH_TOKEN: ${{ github.token }}
          KONFLATE_URL: ${{ secrets.KONFLATE_URL || vars.KONFLATE_URL }}
          PR: ${{ env.PR_NUMBER }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "bot-ler[bot],github-actions[bot]"
          claude_args: |
            --model ${{ vars.CLAUDE_RENOVATE_REVIEW_MODEL || 'claude-sonnet-4-6' }}
            --allowedTools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr review:*),Bash(gh api:*),Bash(gh release view:*),Bash(gh release list:*),Bash(git log:*),Bash(git diff:*),Bash(curl:*),WebFetch,WebSearch"
          prompt: |
            You research same-repository Renovate pull requests in this Flux
            GitOps repository and submit exactly one GitHub PR review comment
            with your findings. You do not modify files, push commits, approve,
            or request changes.

            REPO: ${{ github.repository }}
            PR: #${{ env.PR_NUMBER }}
            Review fingerprint: ${{ steps.review.outputs.fingerprint }}
            Force re-review requested: ${{ env.FORCE_REVIEW }}

            ## Context

            This repository manages a Kubernetes cluster with Flux. Renovate
            commonly updates:

            - OCI Helm chart tags in Flux `OCIRepository` resources.
            - Container image tags or digests in HelmRelease values.
            - GitHub Actions and other workflow dependencies.
            - Regex-managed YAML dependencies.

            The review is advisory. It is not a merge gate.

            ## Instruction hierarchy

            Follow this workflow prompt for this review. Use `AGENTS.md` for
            repository guardrails, `docs/guides/repo-guide.md` for repo layout
            and validation conventions, and `.agents/instructions/` only for
            narrow reusable instructions such as YAML ordering.

            ## Pre-check

            The workflow preflight has already decided this review should run.
            Do not perform duplicate-review skipping. Do not stop early because
            an older Renovate Research Review exists.

            ## Evidence workflow

            1. Read the PR with `gh pr view` and `gh pr diff`.
               Identify each outer artifact being upgraded, old version, new
               version, update type, touched file, and whether it is a wrapper
               dependency such as a chart wrapping an app, a container image
               wrapping upstream software, or a GitHub Action wrapping a CLI
               tool. For wrapper dependencies, identify the inner component and
               its version change when the evidence shows one.

            2. Check CI with `gh pr checks`.
               Do not use the legacy commit status API as check-run evidence. If
               a status endpoint returns `total_count: 0`, that means legacy
               statuses are absent; it does not mean GitHub Actions checks are
               absent, pending, or passing.

            3. If `KONFLATE_URL` is configured and the PR touches Kubernetes,
               Helm, Flux, CRDs, RBAC, routes, storage, secrets, or container
               images, fetch the Konflate summary:

               `curl -fsS -H 'Accept: text/markdown' "${KONFLATE_URL}/api/prs/${PR}/summary"`

               Treat Konflate as advisory rendered-diff evidence. If the summary
               mentions cautions, CRDs, blast radius, removed resources, storage,
               RBAC, routes, webhooks, or secrets, research those rendered
               changes before giving a verdict. Do not print endpoint URLs.

            4. Research upstream by tracing the dependency chain to its origin.
               Changelogs live at the source, not always at the wrapper. Start
               from release notes in the PR body, then follow this order as
               needed:
               - GitHub Releases for every version between old and new, not
                 only the final version.
               - CHANGELOG, UPGRADING, migration, and release-note files in the
                 upstream repository.
               - Wrapper changelogs for charts, images, meta-packages, and
                 GitHub Actions, plus the underlying component changelog.
               - Documentation sites for migration guides, compatibility
                 matrices, deprecations, and breaking-change notes.
               - Commit history between the two versions, scanning for
                 breaking, deprecat, remov, renam, migrat, drop, and require.
               - Registry metadata and README links when releases or changelogs
                 are absent.
               - Web search as a last resort for hard-to-find changelogs or
                 community migration reports.

               Do not stop at the first source when it is only a wrapper
               release or lacks migration detail. Cross-check enough evidence to
               decide whether the change affects this repository.

            5. Map upstream findings to this repo. Read the local manifests that
               consume the dependency: `OCIRepository`, `HelmRelease`,
               Kustomization dependencies, values, ConfigMaps, routes, storage,
               RBAC, and any downstream consumers.

            6. Categorize actionable findings:
               - Breaking changes: incompatibilities requiring repo changes
                 before or alongside this upgrade.
               - Deprecations: treat like breaking changes when this repo uses
                 the deprecated behavior.
               - New features: call out only when they are worth adopting
                 because they simplify config, remove workarounds, or improve
                 reliability for this repo.

               Map each category against actual repository usage. A breaking
               change that affects a feature this repo does not use is not
               actionable; mention it only when it helps explain the verdict.

            ## Dead ends

            If a dependency has no useful releases, changelog, upgrade guide,
            registry metadata, or commit history, say exactly what you checked
            and what could not be verified. Do not fabricate release notes or
            infer safety from "patch release" alone when the PR touches CRDs,
            webhooks, storage, RBAC, routes, auth, or security context.

            ## High-risk checks

            Treat these as material even when the source diff is one line:

            - CRD schema, served/storage versions, or `conversion.webhook`.
            - Webhook Service/Deployment/certificate changes.
            - RBAC or ServiceAccount changes.
            - PVC, storage class, backup, VolSync, or Kopiur changes.
            - Pod `runAsUser`, `runAsGroup`, `fsGroup`, or `fsGroupChangePolicy`
              changes when persistence is enabled.
            - Route, Gateway, Ingress, or public hostname changes.
            - Image digest changes where upstream provenance is unclear.

            For CRD conversion webhooks, verify that the corresponding webhook
            Service and Deployment render or already exist. If you cannot verify
            that, say so and mark confidence low.

            For UID/GID/fsGroup changes with persistence, identify the PVC,
            mount path, `fsGroupChangePolicy`, and whether the risk is a likely
            blocker or a post-rollout watch item.

            ## Verdicts

            Use one of:

            - Safe to merge
            - Human review recommended
            - Changes recommended before merge

            Because this workflow is experimental, always submit a comment-style
            review with `gh pr review --comment`. Do not use `--approve` or
            `--request-changes`.

            ## Review body

            Submit exactly one PR review. Include the marker at the top:

            `<!-- home-ops-renovate-research -->`
            `<!-- home-ops-renovate-research fingerprint:${{ steps.review.outputs.fingerprint }} -->`

            Structure:

            ```markdown
            <!-- home-ops-renovate-research -->
            <!-- home-ops-renovate-research fingerprint:${{ steps.review.outputs.fingerprint }} -->
            ### Renovate Research Review

            **Verdict:** Safe to merge | Human review recommended | Changes recommended before merge

            **What changed**
            - ...

            **Findings**
            - ...

            **Evidence**
            - GitHub: ...
            - Konflate: ...
            - Upstream: ...
            - Repository usage: ...

            **Unknowns**
            - ...
            ```

            Keep it concise but evidence-backed. If there are no material
            findings, do not pad the response.

            When citing GitHub URLs in the review body, rewrite
            `github.com` to `redirect.github.com` to avoid backlink spam.

      - name: Verify Claude result
        if: ${{ always() && steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' && steps.review.outputs.skip != 'true' }}
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -z "${EXECUTION_FILE:-}" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "::error::Claude execution output is missing"
            exit 1
          fi

          subtype="$(jq -r '([.[] | select(.type == "result")][-1] // {}) | if has("subtype") then .subtype else "missing" end' "$EXECUTION_FILE")"
          is_error="$(jq -r '([.[] | select(.type == "result")][-1] // {}) | if has("is_error") then .is_error else "missing" end' "$EXECUTION_FILE")"
          turns="$(jq -r '([.[] | select(.type == "result")][-1] // {}) | if has("num_turns") then .num_turns else "missing" end' "$EXECUTION_FILE")"

          echo "Claude result: subtype=${subtype} is_error=${is_error} turns=${turns}"

          if [ "$subtype" = "missing" ]; then
            echo "::error::Claude did not emit a result message"
            exit 1
          fi

          if [ "$is_error" = "missing" ]; then
            echo "::error::Claude result did not include is_error"
            exit 1
          fi

          if [ "$is_error" = "true" ]; then
            echo "::group::Claude error diagnostic"
            echo "Captured message types:"
            jq -r '[.[] | .type] | join(", ")' "$EXECUTION_FILE"
            echo
            echo "Last assistant/error excerpt:"
            jq -r '
              def flatten_text:
                if type == "string" then .
                elif type == "array" then map(flatten_text) | join("\n")
                elif type == "object" then
                  (.text // .content // .message // .error // .errors // empty | flatten_text)
                else empty end;

              (
                [.[] | select(.type == "assistant" or .type == "error")] | last | flatten_text
              ) // "No assistant or error message was captured."
            ' "$EXECUTION_FILE" |
              sed -E 's#https?://[^[:space:]<>")]+#[redacted-url]#g' |
              sed -E 's#(sk-[A-Za-z0-9_-]{12,})#[redacted-token]#g' |
              sed -E 's#(gh[pousr]_[A-Za-z0-9_]{20,})#[redacted-token]#g' |
              head -c 4000
            echo
            echo "::endgroup::"
            echo "::error::Claude exited with is_error=true"
            exit 1
          fi

      - name: Verify fresh review
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' && steps.review.outputs.skip != 'true' }}
        env:
          FINGERPRINT: ${{ steps.review.outputs.fingerprint }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.review.outputs.head_sha }}
          PR: ${{ env.PR_NUMBER }}
          REVIEW_STARTED_AT: ${{ steps.review.outputs.started_at }}
        run: |
          base_marker="<!-- home-ops-renovate-research -->"
          fingerprint_marker="<!-- home-ops-renovate-research fingerprint:${FINGERPRINT} -->"
          expected_author="claude[bot]"
          reviews_json="${RUNNER_TEMP}/renovate-research-reviews.json"
          review=""

          for attempt in 1 2 3 4 5 6; do
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}/reviews" > "${reviews_json}"

            review="$(
              jq \
                --arg author "${expected_author}" \
                --arg head "${HEAD_SHA}" \
                --arg marker "${base_marker}" \
                --arg started "${REVIEW_STARTED_AT}" '
                  [
                    .[]
                    | select(.user.login == $author)
                    | select(.commit_id == $head)
                    | select(.body != null and (.body | contains($marker)))
                    | select(.submitted_at >= $started)
                  ]
                  | last // empty
                ' "${reviews_json}"
            )"

            if [ -n "${review}" ]; then
              break
            fi

            if [ "${attempt}" -lt 6 ]; then
              echo "::notice::Fresh Renovate research review not visible yet; retrying (${attempt}/6)"
              sleep 5
            fi
          done

          if [ -z "${review}" ]; then
            echo "::error::Claude did not submit a fresh Renovate research review from ${expected_author} on ${HEAD_SHA} with marker ${base_marker}"
            exit 1
          fi

          review_author="$(jq -r '.user.login' <<< "${review}")"
          review_commit="$(jq -r '.commit_id' <<< "${review}")"
          review_submitted_at="$(jq -r '.submitted_at' <<< "${review}")"
          review_body="$(jq -r '.body // ""' <<< "${review}")"

          if [ "${review_author}" != "${expected_author}" ]; then
            echo "::error::Fresh review was authored by ${review_author}; expected ${expected_author}"
            exit 1
          fi

          if [ "${review_commit}" != "${HEAD_SHA}" ]; then
            echo "::error::Fresh review is attached to ${review_commit}; expected current PR head ${HEAD_SHA}"
            exit 1
          fi

          if [[ "${review_body}" != *"${fingerprint_marker}"* ]]; then
            echo "::notice::Fresh review did not contain the exact fingerprint marker ${fingerprint_marker}; accepting the stable marker on the current head"
          fi

          echo "Verified fresh Renovate research review from ${review_author} at ${review_submitted_at} for ${review_commit}."

      - name: Remove trigger label
        if: ${{ always() && env.FORCE_REVIEW == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ env.PR_NUMBER }}
        run: |
          if ! gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/issues/${PR}/labels/renovate-review"; then
            echo "::notice::Could not remove renovate-review label automatically"
          fi
