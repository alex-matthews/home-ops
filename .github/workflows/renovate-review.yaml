---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Renovate PR Review

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Renovate PR number to review
        required: true
        type: number
  pull_request:
    branches:
      - main
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
    paths:
      - kubernetes/**

env:
  FORCE_REVIEW: ${{ github.event_name == 'workflow_dispatch' }}
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}

permissions: {}

jobs:
  renovate-review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.user.login == 'bot-ler[bot]' &&
        !github.event.pull_request.draft
      )
    name: Renovate PR Review
    permissions:
      checks: read
      contents: read
      id-token: write
      pull-requests: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr || github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check review scope
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ env.PR_NUMBER }}
        run: |
          skip() {
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$1"
            exit 0
          }

          pr_meta="${RUNNER_TEMP}/renovate-review-pr-meta.json"
          pr_file_paths="${RUNNER_TEMP}/renovate-review-file-paths.txt"
          pr_file_paths_json="${RUNNER_TEMP}/renovate-review-file-paths.json"

          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}" > "${pr_meta}"

          pr_state="$(jq -r '.state' "${pr_meta}")"
          pr_author="$(jq -r '.user.login' "${pr_meta}")"
          pr_base="$(jq -r '.base.ref' "${pr_meta}")"
          pr_draft="$(jq -r '.draft' "${pr_meta}")"
          pr_head_repo="$(jq -r '.head.repo.full_name // ""' "${pr_meta}")"

          if [ "${pr_state}" != "open" ]; then
            skip "Skipping; PR #${PR} is ${pr_state}."
          fi

          if [ "${pr_author}" != "bot-ler[bot]" ]; then
            skip "Skipping; PR #${PR} author is ${pr_author}, not bot-ler[bot]."
          fi

          if [ "${pr_head_repo}" != "${GITHUB_REPOSITORY}" ]; then
            skip "Skipping; PR #${PR} head repository is ${pr_head_repo}, not ${GITHUB_REPOSITORY}."
          fi

          if [ "${pr_base}" != "main" ]; then
            skip "Skipping; PR #${PR} targets ${pr_base}, not main."
          fi

          if [ "${pr_draft}" = "true" ]; then
            skip "Skipping; PR #${PR} is a draft."
          fi

          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR}/files" \
            --jq '.[].filename' > "${pr_file_paths}"

          jq -R . < "${pr_file_paths}" | jq -s . > "${pr_file_paths_json}"

          if ! grep -Eq '^kubernetes/' "${pr_file_paths}"; then
            skip "Skipping; PR #${PR} does not touch reviewed paths."
          fi

          if grep -Fxq ".github/workflows/renovate-review.yaml" "${pr_file_paths}"; then
            skip "Skipping; reviewer workflow self-edit must match the default branch."
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check reviewer config
        id: config
        if: ${{ steps.scope.outputs.skip != 'true' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not configured; skipping Renovate PR review"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/pull/${{ env.PR_NUMBER }}/head

      - name: Prepare review
        id: review
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' }}
        env:
          FORCE_REVIEW: ${{ env.FORCE_REVIEW }}
          GH_TOKEN: ${{ github.token }}
          PR: ${{ env.PR_NUMBER }}
        run: |
          policy_version="5"
          review_input="${RUNNER_TEMP}/renovate-review-input.txt"
          review_meta="${RUNNER_TEMP}/renovate-review-pr-meta.json"
          review_file_paths="${RUNNER_TEMP}/renovate-review-file-paths.json"
          prior_comment_meta="${RUNNER_TEMP}/renovate-review-prior-comments.json"

          head_sha="$(jq -r '.head.sha' "${review_meta}")"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

          pr_patch_ids="$(
            gh pr diff "${PR}" --repo "${GITHUB_REPOSITORY}" --patch |
              git patch-id --stable |
              awk '{print $1}' |
              sort
          )"

          if [ -z "${pr_patch_ids}" ]; then
            echo "::notice::PR diff produced no stable patch ids; using an empty patch marker"
            pr_patch_ids="empty"
          fi

          pr_patch_id="$(printf "%s\n" "${pr_patch_ids}" | sha256sum | cut -d " " -f 1)"

          jq --arg policy_version "${policy_version}" \
            --arg pr_patch_id "${pr_patch_id}" \
            --slurpfile files "${review_file_paths}" \
            '{
              title,
              files: ($files[0] | sort),
              renovateTable: ((.body // "") | split("---")[0]),
              policyVersion: $policy_version,
              stablePrPatchId: $pr_patch_id
            }' \
            "${review_meta}" > "${review_input}"

          fingerprint="$(sha256sum "${review_input}" | cut -d " " -f 1)"
          echo "fingerprint=${fingerprint}" >> "$GITHUB_OUTPUT"
          echo "started_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "::notice::Prepared Renovate review key policy=${policy_version} head=${head_sha} pr_patch=${pr_patch_id} fingerprint=${fingerprint}"

          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" |
            jq 'add' > "${prior_comment_meta}"

          latest_comment="$(
            jq -c '
              [
                .[]
                | select(.user.login == "claude[bot]")
                | select(.body != null and (.body | contains("home-ops-renovate-research")))
              ]
              | sort_by(.created_at)
              | last // {}
            ' "${prior_comment_meta}"
          )"

          previous_fingerprint="$(
            jq -r '.body // ""' <<< "${latest_comment}" |
              grep -Eo 'home-ops-renovate-research fingerprint:[0-9a-f]+' |
              tail -n 1 |
              sed 's/.*fingerprint://'
          )" || true

          if [ "${FORCE_REVIEW}" != "true" ] && [ -n "${previous_fingerprint}" ] && [ "${previous_fingerprint}" = "${fingerprint}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Renovate PR review; review key ${fingerprint} was already commented"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Fetch Konflate summary
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' && steps.review.outputs.skip != 'true' }}
        env:
          KONFLATE_URL: ${{ vars.KONFLATE_URL }}
        run: |
          summary=".renovate-review/konflate-summary.md"
          mkdir -p "${summary%/*}"
          [ -n "${KONFLATE_URL:-}" ] && curl -fsS -H "Accept: text/markdown" "${KONFLATE_URL%/}/api/prs/${PR_NUMBER}/summary" > "${summary}" ||
            echo "Konflate summary unavailable." > "${summary}"

      - name: Review Renovate PR
        id: claude
        if: ${{ steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' && steps.review.outputs.skip != 'true' }}
        uses: anthropics/claude-code-action@700e7f8316990de46bed556429765647af760efc # v1.0.176
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ env.PR_NUMBER }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "bot-ler[bot]"
          claude_args: |
            --model ${{ vars.CLAUDE_RENOVATE_REVIEW_MODEL || 'claude-sonnet-5' }}
            --allowedTools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(gh release view:*),Bash(gh release list:*),Bash(git log:*),Bash(git diff:*),WebFetch,WebSearch"
          prompt: |
            You research same-repository Renovate pull requests in this Flux
            GitOps repository and submit exactly one advisory top-level GitHub
            PR comment. Do not modify files, push commits, approve, or request
            changes. The comment is advisory, not a merge gate.

            REPO: ${{ github.repository }}
            PR: #${{ env.PR_NUMBER }}
            Review fingerprint: ${{ steps.review.outputs.fingerprint }}
            Force re-review requested: ${{ env.FORCE_REVIEW }}
            Follow this prompt, then `AGENTS.md`, `docs/guides/repo-guide.md`,
            and only relevant `.agents/instructions/`. Preflight already chose
            this PR; do not duplicate-skip or stop because an older comment exists.
            Review contract:
            - Read `gh pr view` and `gh pr diff`. For each upgraded artifact,
              note old/new version, update type, touched file, wrapper type
              (chart->app, image->software, Action->CLI), and inner component
              version when evidence shows one.
            - Check CI with `gh pr checks`. Legacy status API `total_count: 0`
              means no legacy statuses, not absent/pending/passing Actions. Do
              not cite or summarize this Renovate PR Review workflow.
            - Read `.renovate-review/konflate-summary.md` as advisory rendered
              evidence. If it says unavailable, report that plainly. If it
              mentions cautions, CRDs, blast radius, removals, storage, RBAC,
              routes, webhooks, or secrets, research those before the verdict.
              If CRDs changed, use this summary to identify affected resources,
              then inspect upstream CRD source diffs and summarize all schema or
              description changes; do not call the impact image-only.
              Do not fetch, link, name, or quote the interactive Konflate UI,
              configured hostnames, or raw non-GitHub URLs.
              Do not repeat Konflate resource/app/CRD counts anywhere in the
              comment body; summarize only cautions or repo impact.
            - Trace upstream to origin. Start with PR release notes, then use
              GitHub Releases for every version, CHANGELOG/UPGRADING/migration
              docs, wrapper plus underlying changelogs, compatibility/breaking
              docs, commit history scanning breaking/deprecat/remov/renam/
              migrat/drop/require, registry metadata/README, and web search last.
              Do not stop at wrapper-only notes; cross-check repo impact.
            - Map findings to local usage in `OCIRepository`, `HelmRelease`,
              Kustomization deps, values, ConfigMaps, routes, storage, RBAC, and
              consumers. Distinguish rendered manifest changes from upstream
              runtime behavior changes that affect operator-created workloads.
            - Classify only actionable repo impact: breaking changes, used
              deprecations, and new features worth adopting because they remove
              workarounds or improve reliability. Unused breaking changes are
              context, not action items.
            Treat these one-line diffs as high risk: CRD schema/version/
            `conversion.webhook`; webhook Service/Deployment/certs; RBAC or
            ServiceAccount; PVC/storage/backup/VolSync/Kopiur; runAsUser,
            runAsGroup, fsGroup, or fsGroupChangePolicy with persistence; routes,
            gateways, ingresses, public hostnames; image digests with unclear
            provenance. For CRD conversion webhooks, verify the webhook Service
            and Deployment render or already exist, or mark confidence low. For
            UID/GID/fsGroup changes, identify PVC, mount path, policy, and
            blocker-vs-watch risk.

            If releases/changelog/guide/metadata/history are unavailable, say
            what you checked and what remains unverified. Do not invent notes or
            infer safety from "patch release" for CRDs, webhooks, storage, RBAC,
            routes, auth, or security context.
            Submit exactly one `gh pr comment`, never approve or request changes.
            Use one recommendation: Safe to merge | Human review
            recommended | Changes recommended before merge. Use High confidence
            only when Konflate and upstream/local-impact evidence cover the
            changed risk surfaces; use Low when material evidence is unavailable.
            Keep the visible summary compact; put detail in `<details>`.
            Do not link the current PR. Use `redirect.github.com` links for
            upstream evidence; include 1-3 proper Markdown links and no bare
            `owner/repo#123` refs.
            Use this exact structure:
            ```markdown
            <!-- home-ops-renovate-research -->
            <!-- home-ops-renovate-research fingerprint:${{ steps.review.outputs.fingerprint }} recommendation:safe|human-review|changes-recommended confidence:high|medium|low konflate:ok|unavailable gate:false -->
            ### Renovate PR Review

            **Recommendation:** Safe to merge / Human review recommended / Changes recommended before merge
            **Confidence:** High / Medium / Low
            **Operator action:** ...
            **Needs attention:** None. / ...

            **Why**
            - ...

            <details>
            <summary>Review details</summary>

            **What changed**
            - ...

            </details>

            <details>
            <summary>Evidence checked</summary>

            - GitHub: ...
            - Konflate: ...
            - Upstream: ...
            - Repository usage: ...
            - Unknowns: ...

            </details>
            ```

      - name: Verify review
        if: ${{ always() && steps.config.outputs.enabled == 'true' && steps.scope.outputs.skip != 'true' && steps.review.outputs.skip != 'true' }}
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          FINGERPRINT: ${{ steps.review.outputs.fingerprint }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.review.outputs.head_sha }}
          PR: ${{ env.PR_NUMBER }}
          REVIEW_STARTED_AT: ${{ steps.review.outputs.started_at }}
        run: |
          if [ -z "${EXECUTION_FILE:-}" ] || [ ! -f "${EXECUTION_FILE}" ]; then
            echo "::error::Claude execution output is missing"
            exit 1
          fi

          result="$(jq -c '[.[] | select(.type == "result")][-1] // {}' "${EXECUTION_FILE}")"
          is_error="$(jq -r 'if has("is_error") then .is_error else "missing" end' <<< "${result}")"
          echo "Claude result: $(jq -rc '{subtype, is_error, num_turns}' <<< "${result}")"

          if [ "${is_error}" = "missing" ]; then
            echo "::error::Claude did not emit a usable result message"
            exit 1
          fi

          if [ "${is_error}" = "true" ]; then
            echo "::group::Claude error diagnostic"
            jq -r '"Captured message types: " + ([.[] | .type] | join(", "))' "${EXECUTION_FILE}"
            echo "Last assistant/error excerpt:"
            jq -r '
              def text:
                if type == "string" then .
                elif type == "array" then map(text) | join("\n")
                elif type == "object" then
                  (.text // .content // .message // .error // .errors // empty | text)
                else empty end;
              ([.[] | select(.type == "assistant" or .type == "error")] | last | text)
                // "No assistant or error message was captured."
            ' "${EXECUTION_FILE}" |
              sed -E '
                s#https?://[^[:space:]<>")]+#[redacted-url]#g
                s#sk-[A-Za-z0-9_-]{12,}#[redacted-token]#g
                s#gh[pousr]_[A-Za-z0-9_]{20,}#[redacted-token]#g
              ' |
              head -c 4000
            echo
            echo "::endgroup::"
            echo "::error::Claude exited with is_error=true"
            exit 1
          fi

          marker="<!-- home-ops-renovate-research -->"
          comments_json="${RUNNER_TEMP}/renovate-research-comments.json"
          comment=""

          for attempt in 1 2 3 4 5 6; do
            gh api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" |
              jq 'add' > "${comments_json}"

            comment="$(
              jq -c --arg fingerprint "fingerprint:${FINGERPRINT}" --arg marker "${marker}" --arg started "${REVIEW_STARTED_AT}" '
                [
                  .[]
                  | select(.user.login == "claude[bot]")
                  | select(.body != null and (.body | contains($marker)))
                  | select(.body | contains($fingerprint))
                  | select(.created_at >= $started)
                ]
                | last // empty
              ' "${comments_json}"
            )"

            if [ -n "${comment}" ]; then
              break
            fi

            if [ "${attempt}" -lt 6 ]; then
              echo "::notice::Fresh comment not visible yet; retrying (${attempt}/6)"
              sleep 5
            fi
          done

          if [ -z "${comment}" ]; then
            echo "::error::No fresh claude[bot] comment for review key ${FINGERPRINT} with marker ${marker}"
            exit 1
          fi

          echo "Verified fresh claude[bot] comment for ${HEAD_SHA} at $(jq -r '.created_at' <<< "${comment}")."
