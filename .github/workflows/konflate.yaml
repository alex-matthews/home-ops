---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Konflate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  comment:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    name: Konflate - Comment
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rendered summary
        id: fetch
        env:
          KONFLATE_URL: ${{ secrets.KONFLATE_URL }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "${KONFLATE_URL:-}" ]; then
            echo "::notice::KONFLATE_URL secret is not set; skipping konflate comment"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          konflate_url="${KONFLATE_URL%/}"

          if status="$(curl -fsS --retry 10 --retry-delay 3 \
               -H 'Accept: text/markdown' \
               -o summary.md -w '%header{x-konflate-render-status}' \
               "${konflate_url}/api/prs/${PR}/summary")" \
             && [ -s summary.md ]; then
            {
              echo "ready=true"
              echo "status=${status}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::konflate summary unavailable or empty; skipping comment"
          fi

      - name: Generate token
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Find comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        id: find-comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: ${{ steps.app-token.outputs.app-slug }}[bot]
          body-includes: "<!-- konflate"

      - name: Create or update comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: summary.md
          edit-mode: replace

      - name: Report render status
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          STATUS: ${{ steps.fetch.outputs.status }}
        run: |
          case "$STATUS" in
            ok)
              echo "konflate render: ok"
              ;;
            failures)
              echo "::warning::konflate render: one or more resources failed to render"
              ;;
            error)
              echo "::warning::konflate render: render errored"
              ;;
            *)
              echo "::notice::konflate render: unexpected status '${STATUS}'"
              ;;
          esac
