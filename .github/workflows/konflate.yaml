---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Konflate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  comment:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    name: Konflate - Comment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Fetch rendered summary
        id: fetch
        env:
          KONFLATE_URL: ${{ secrets.KONFLATE_URL }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "${KONFLATE_URL:-}" ]; then
            echo "::notice::KONFLATE_URL secret is not set; skipping konflate comment"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          konflate_url="${KONFLATE_URL%/}"

          if status="$(curl -fsS --retry 10 --retry-delay 3 \
               -H 'Accept: text/markdown' \
               -o summary.md -w '%header{x-konflate-render-status}' \
               "${konflate_url}/api/prs/${PR}/summary")" \
             && [ -s summary.md ]; then
            {
              echo "ready=true"
              echo "status=${status}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::konflate summary unavailable or empty; skipping comment"
          fi

      - name: Create or update comment
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const marker = "<!-- konflate";
            let body = fs.readFileSync("summary.md", "utf8");

            if (!body.includes(marker)) {
              body = `${body.trim()}\n\n<!-- konflate:pr-${context.issue.number} -->\n`;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const comment = comments.find((item) => (
              item.user?.type === "Bot" && item.body?.includes(marker)
            ));

            if (comment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Report render status
        if: ${{ steps.fetch.outputs.ready == 'true' }}
        env:
          STATUS: ${{ steps.fetch.outputs.status }}
        run: |
          case "$STATUS" in
            ok)
              echo "konflate render: ok"
              ;;
            failures)
              echo "::warning::konflate render: one or more resources failed to render"
              ;;
            error)
              echo "::warning::konflate render: render errored"
              ;;
            *)
              echo "::notice::konflate render: unexpected status '${STATUS}'"
              ;;
          esac
