---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Get changed workflow files
        id: workflow-files
        if: ${{ github.event_name == 'pull_request' }}
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            .github/actionlint.yaml
            .github/workflows/**/*.yaml
            .github/workflows/**/*.yml

      - name: Get changed formatted files
        id: formatted-files
        if: ${{ github.event_name == 'pull_request' }}
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            **/*.json
            **/*.json5
            **/*.md
            **/*.toml
            **/*.yaml
            **/*.yml
            !**/*.sops.yaml
            !**/*.sops.yml

      - name: Checkout
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.workflow-files.outputs.changed_files != '[]' ||
            steps.formatted-files.outputs.changed_files != '[]'
          }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.workflow-files.outputs.changed_files != '[]' ||
            steps.formatted-files.outputs.changed_files != '[]'
          }}
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          install_args: actionlint oxfmt zizmor

      - name: Lint workflows
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.workflow-files.outputs.changed_files != '[]'
          }}
        run: mise exec -- actionlint

      - name: Audit workflows
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.workflow-files.outputs.changed_files != '[]'
          }}
        run: mise exec -- zizmor --offline .github/workflows

      - name: Check formatting
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.formatted-files.outputs.changed_files != '[]'
          }}
        run: mise exec -- oxfmt --check . '!**/*.sops.yaml' '!**/*.sops.yml'

      - name: Nothing to lint
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            steps.workflow-files.outputs.changed_files == '[]' &&
            steps.formatted-files.outputs.changed_files == '[]'
          }}
        run: echo "No workflow or formatted file changes detected"
