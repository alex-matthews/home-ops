---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Get changed actionlint files
        id: actionlint-files
        if: ${{ github.event_name == 'pull_request' }}
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            .github/actionlint.yaml
            .github/workflows/**/*.yaml
            .github/workflows/**/*.yml

      - name: Get changed workflow files
        id: workflow-files
        if: ${{ github.event_name == 'pull_request' }}
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            .github/workflows/**/*.yaml
            .github/workflows/**/*.yml

      - name: Get changed formatted files
        id: formatted-files
        if: ${{ github.event_name == 'pull_request' }}
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            **/*.json
            **/*.json5
            **/*.md
            **/*.toml
            **/*.yaml
            **/*.yml
            !**/*.sops.yaml
            !**/*.sops.yml

      - name: Plan lint tools
        id: lint-tools
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.actionlint-files.outputs.changed_files != '[]' ||
            steps.workflow-files.outputs.changed_files != '[]' ||
            steps.formatted-files.outputs.changed_files != '[]'
          }}
        env:
          ACTIONLINT_FILES: ${{ steps.actionlint-files.outputs.changed_files }}
          FORMATTED_FILES: ${{ steps.formatted-files.outputs.changed_files }}
          WORKFLOW_FILES: ${{ steps.workflow-files.outputs.changed_files }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "install_args=actionlint oxfmt zizmor" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tools=()

          if [ "${ACTIONLINT_FILES}" != "[]" ]; then
            tools+=(actionlint)
          fi

          if [ "${FORMATTED_FILES}" != "[]" ]; then
            tools+=(oxfmt)
          fi

          if [ "${WORKFLOW_FILES}" != "[]" ]; then
            tools+=(zizmor)
          fi

          echo "install_args=${tools[*]}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.lint-tools.outputs.install_args != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Mise
        if: ${{ steps.lint-tools.outputs.install_args != '' }}
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: false
          install_args: ${{ steps.lint-tools.outputs.install_args }}

      - name: Lint workflows
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.actionlint-files.outputs.changed_files != '[]'
          }}
        run: mise exec --no-deps -- actionlint

      - name: Audit workflows
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.workflow-files.outputs.changed_files != '[]'
          }}
        run: mise exec --no-deps -- zizmor --offline .github/workflows

      - name: Check formatting
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            steps.formatted-files.outputs.changed_files != '[]'
          }}
        run: mise exec --no-deps -- oxfmt --check . '!**/*.sops.yaml' '!**/*.sops.yml'

      - name: Nothing to lint
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            steps.actionlint-files.outputs.changed_files == '[]' &&
            steps.workflow-files.outputs.changed_files == '[]' &&
            steps.formatted-files.outputs.changed_files == '[]'
          }}
        run: echo "No workflow or formatted file changes detected"
