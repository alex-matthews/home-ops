---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/mcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana
spec:
  image: docker.io/grafana/mcp-grafana:0.16.0@sha256:0f44fff15b0a7295dacb3b0be0a89c57a9e54cd575ab0cbd539d6147f8c786f2
  transport: streamable-http
  proxyPort: 8080
  mcpPort: 8000
  args:
    - -t
    - streamable-http
    - --address
    - 0.0.0.0:8000
    - --disable-admin
    - --disable-incident
    - --disable-oncall
    - --disable-provisioning
    - --disable-rendering
    - --disable-sift
    - --disable-write
  env:
    - name: GRAFANA_URL
      value: http://grafana-service.observability.svc.cluster.local:3000
  secrets:
    - name: grafana-mcp-secret
      key: GRAFANA_SERVICE_ACCOUNT_TOKEN
      targetEnvName: GRAFANA_SERVICE_ACCOUNT_TOKEN
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  toolConfigRef:
    name: grafana
  groupRef:
    name: mcp-tools
