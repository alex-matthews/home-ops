---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 1h
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              NO_COLOR: "1"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            args:
              - gateway
              - run
              - --no-supervise
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
          dashboard:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            env:
              GATEWAY_HEALTH_URL: http://localhost:8642
              HERMES_HOME: /opt/data
              HOME: /opt/data
              NO_COLOR: "1"
            args:
              - dashboard
              - --host
              - 0.0.0.0
              - --insecure
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: hermes
        ports:
          http:
            port: 8642
      dashboard:
        controller: hermes
        ports:
          http:
            port: 9119
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: hermes-config
        globalMounts:
          - path: /opt/data/config.yaml
            subPath: config.yaml
            readOnly: true
