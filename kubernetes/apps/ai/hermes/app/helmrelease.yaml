---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 1h
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4
            env:
              HERMES_HOME: /opt/data
              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_INSECURE: "1"
              HERMES_DASHBOARD_PORT: "9119"
              HOME: /opt/data
              NO_COLOR: "1"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            args:
              - gateway
              - run
              - --no-supervise
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: hermes
        ports:
          http:
            port: 8642
      dashboard:
        controller: hermes
        ports:
          http:
            port: 9119
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: dashboard
                port: http
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: hermes-config
        globalMounts:
          - path: /opt/data/config.yaml
            subPath: config.yaml
            readOnly: true
