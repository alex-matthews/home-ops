---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |
    _config_version: 32
    providers:
      litellm:
        name: LiteLLM
        base_url: http://litellm.ai.svc.cluster.local:4000/v1
        key_env: LITELLM_MASTER_KEY
        transport: chat_completions
        default_model: minimax/MiniMax-M3
    model:
      provider: litellm
      default: minimax/MiniMax-M3
    toolsets:
      - hermes-cli
      - mcp-toolhive
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      persistent_shell: true
    mcp_servers:
      toolhive:
        url: http://vmcp-home-ops-workbench.ai.svc.cluster.local:4483/mcp
        tools:
          prompts: false
          resources: false
    compression:
      enabled: true
      threshold: 0.50
      target_ratio: 0.20
      protect_last_n: 20
    agent:
      max_turns: 60
      gateway_timeout: 1200
      restart_drain_timeout: 60
      api_max_retries: 2
      reasoning_effort: medium
    streaming:
      enabled: false
    skills:
      write_approval: true
      guard_agent_created: false
    curator:
      consolidate: false
    security:
      redact_secrets: true
    privacy:
      redact_pii: true
