---
- Now:
    - Plex Activity:
        href: https://plex.${SECRET_DOMAIN}
        description: Now playing
        icon: sh-plex
        widget:
          type: tautulli
          url: http://tautulli.default.svc.cluster.local
          key: "{{HOMEPAGE_VAR_TAUTULLI_API_KEY}}"
          hide_errors: true
          enableUser: true
          showEpisodeNumber: true
    - Requests:
        href: https://seerr.${SECRET_DOMAIN}
        description: Media requests
        icon: sh-overseerr
        widget:
          type: seerr
          url: http://seerr.default.svc.cluster.local
          key: "{{HOMEPAGE_VAR_SEERR_API_KEY}}"
          hide_errors: true
          fields: ["pending", "approved", "completed"]
    - Releases:
        href: https://sonarr.${SECRET_DOMAIN}
        description: Calendar
        icon: mdi-calendar-month-outline
        widget:
          type: calendar
          view: agenda
          maxEvents: 12
          showTime: true
          timezone: Pacific/Auckland
          integrations:
            - type: sonarr
              service_group: Media
              service_name: Sonarr
              color: sky
              baseUrl: https://sonarr.${SECRET_DOMAIN}
            - type: radarr
              service_group: Media
              service_name: Radarr
              color: amber
              baseUrl: https://radarr.${SECRET_DOMAIN}

- Downloads:
    - qBittorrent:
        href: https://qbittorrent.${SECRET_DOMAIN}
        description: Torrent queue
        icon: sh-qbittorrent
        widget:
          type: qbittorrent
          url: http://qbittorrent.default.svc.cluster.local
          hide_errors: true
          enableLeechProgress: true
          enableLeechSize: true
          fields: ["leech", "download", "seed", "upload"]
    - SABnzbd:
        href: https://sabnzbd.${SECRET_DOMAIN}
        description: Usenet queue
        icon: sh-sabnzbd
        widget:
          type: sabnzbd
          url: http://sabnzbd.default.svc.cluster.local:8080
          key: "{{HOMEPAGE_VAR_SABNZBD_API_KEY}}"
          hide_errors: true
          fields: ["rate", "queue", "timeleft"]
    - Autobrr:
        href: https://autobrr.${SECRET_DOMAIN}
        description: Release filters
        icon: sh-autobrr
        widget:
          type: autobrr
          url: http://autobrr.default.svc.cluster.local
          key: "{{HOMEPAGE_VAR_AUTOBRR_API_KEY}}"
          hide_errors: true
          fields: ["approvedPushes", "rejectedPushes", "filters", "indexers"]

- Media:
    - Radarr:
        href: https://radarr.${SECRET_DOMAIN}
        description: Movies
        icon: sh-radarr
        widget:
          type: radarr
          url: http://radarr.default.svc.cluster.local
          key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
          hide_errors: true
          fields: ["wanted", "missing", "queued"]
          enableQueue: true
    - Sonarr:
        href: https://sonarr.${SECRET_DOMAIN}
        description: Series
        icon: sh-sonarr
        widget:
          type: sonarr
          url: http://sonarr.default.svc.cluster.local
          key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
          hide_errors: true
          fields: ["wanted", "queued", "series"]
          enableQueue: true
    - Prowlarr:
        href: https://prowlarr.${SECRET_DOMAIN}
        description: Indexers
        icon: sh-prowlarr
        widget:
          type: prowlarr
          url: http://prowlarr.default.svc.cluster.local
          key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
          hide_errors: true
          fields: ["numberOfQueries", "numberOfGrabs", "numberOfFailQueries", "numberOfFailGrabs"]

- Network:
    - UniFi:
        href: https://192.168.1.1
        description: Gateway and clients
        icon: sh-ubiquiti-unifi
        widget:
          type: unifi
          url: https://192.168.1.1
          key: "{{HOMEPAGE_VAR_UNIFI_API_KEY}}"
          hide_errors: true
          fields: ["wan", "lan_users", "wlan_users", "uptime"]
    - Gatus:
        href: https://status.${SECRET_DOMAIN}
        description: Service checks
        icon: sh-gatus
        widget:
          type: gatus
          url: http://gatus.observability.svc.cluster.local
          hide_errors: true
          fields: ["up", "down", "uptime"]

- Operations:
    - Grafana:
        href: https://grafana.${SECRET_DOMAIN}
        description: Dashboards
        icon: sh-grafana
    - Alertmanager:
        href: https://alertmanager.${SECRET_DOMAIN}
        description: Alert routes
        icon: sh-prometheus
    - Home Ops:
        href: https://github.com/alex-matthews/home-ops
        description: GitOps repository
        icon: sh-github

- Shortcuts:
    - KubeSearch:
        href: https://kubesearch.dev/
        description: Manifest examples
        icon: sh-kubernetes
    - Homepage Docs:
        href: https://gethomepage.dev/
        description: Widget reference
        icon: sh-homepage
    - Qui:
        href: https://qui.${SECRET_DOMAIN}
        description: qBittorrent controls
        icon: sh-qbittorrent
    - Konflate:
        href: https://konflate.${SECRET_DOMAIN}
        description: Manifest previews
        icon: sh-kubernetes
