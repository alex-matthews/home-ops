---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      repo: github://alex-matthews/home-ops
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
