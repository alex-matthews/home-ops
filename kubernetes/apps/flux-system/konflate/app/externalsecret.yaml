---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate-webhook-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: konflate-webhook-token-secret
    template:
      data:
        # Required for native Konflate PR comments and check write-back.
        KONFLATE_APP_CLIENT_ID: "{{ .KONFLATE_APP_CLIENT_ID }}"
        KONFLATE_APP_PRIVATE_KEY: "{{ .KONFLATE_APP_PRIVATE_KEY }}"
        KONFLATE_WEBHOOK_SECRET: "{{ .KONFLATE_WEBHOOK_SECRET }}"
  dataFrom:
    - extract:
        key: konflate
