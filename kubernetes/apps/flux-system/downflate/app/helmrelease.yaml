---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: downflate
spec:
  chartRef:
    kind: OCIRepository
    name: downflate
  interval: 1h
  values:
    controllers:
      downflate:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/downflate
              tag: main@sha256:82b1993bf5e3ad1d54bf1db6b53f4230e0cd52f29976176eba41f76bb0a7b4e1
            env:
              DOWNFLATE_ADDR: :80
              DOWNFLATE_CLUSTER_PATH: ./kubernetes/flux/cluster
              DOWNFLATE_NODES:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              DOWNFLATE_REPO: github://alex-matthews/home-ops
              DOWNFLATE_RESTRICT_EGRESS: "true"
              DOWNFLATE_STATUS_CONTEXT: Downflate
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 80
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 404"]
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      talos:
        type: secret
        name: "{{ .Release.Name }}"
        globalMounts:
          - path: /var/run/secrets/talos.dev
            readOnly: true
      tmpfs:
        type: emptyDir
        advancedMounts:
          downflate:
            app:
              - path: /.cache
                subPath: cache
              - path: /tmp
                subPath: tmp
