---
apiVersion: v1
kind: Service
metadata:
  name: echo-pilot
  annotations:
    lbipam.cilium.io/ips: 192.168.96.250
  labels:
    load-balancer-ip-pool: services
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/instance: echo
    app.kubernetes.io/name: echo
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
