---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./grafana.yaml
  - ./grafanadashboard.yaml
  - ./grafanadatasource.yaml
  - ./grafanafolder.yaml
  - ./servicemonitor.yaml
configMapGenerator:
  - name: home-ops-cockpit-dashboard
    files:
      - home-ops-cockpit.json=./resources/home-ops-cockpit.json
generatorOptions:
  disableNameSuffixHash: true
