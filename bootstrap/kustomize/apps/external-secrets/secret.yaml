---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-credentials-secret
stringData:
  # Keep this as `|` and keep another document after it. The 1Password Connect
  # credentials are raw JSON, but Kubernetes Secret stringData must receive it as
  # a string. If yamlfmt rewrites this final block scalar to `|-`, the
  # `kustomize build | just template -` pipeline can render the op-injected JSON
  # as a YAML object instead of a string, producing an invalid credentials file.
  # Re-test with:
  #   kustomize build bootstrap/kustomize/apps | just template - | yq -r 'select(.kind == "Secret" and .metadata.name == "onepassword-connect-credentials-secret").stringData."1password-credentials.json"' | jq type
  # Expected output: "object"
  1password-credentials.json: |
    op://kubernetes/1password/OP_SESSION_JSON
---
apiVersion: v1
kind: Secret
metadata:
  name: onepassword-connect-vault-secret
stringData:
  OP_CONNECT_TOKEN: |-
    op://kubernetes/1password/OP_CONNECT_TOKEN
